# Production: Next.js + nginx приложения на 127.0.0.1:8082
# TLS — infra/syllinn.me/ на хосте

services:
  frontend:
    build:
      context: ..
      dockerfile: production/Dockerfile
      secrets:
        - npmrc
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      NODE_ENV: production
      BACKEND: ${BACKEND:-piped}
      INVIDIOUS_INTERNAL_URL: ${INVIDIOUS_INTERNAL_URL:-http://host.docker.internal:8091}
      PIPED_INTERNAL_URL: ${PIPED_INTERNAL_URL:-http://host.docker.internal:8090}
      BACKEND_INTERNAL_URL: ${BACKEND_INTERNAL_URL:-}
      NEXT_PUBLIC_API_BASE: /api

  nginx:
    image: docker.io/library/nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - frontend
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "127.0.0.1:${HTTP_PORT:-8082}:80"
    volumes:
      - ./nginx/app.conf:/etc/nginx/conf.d/default.conf:ro

secrets:
  npmrc:
    file: ../.npmrc
