# Роутинг приложения piped-video (без TLS и без server_name).
# Подключается в docker compose; снаружи — только через infra-прокси на :8082.

upstream frontend_upstream {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 50M;

    # Invidious: относительные /vi/… в thumbnail URL
    set $invidious_host "invidious.syllinn.me";

    location /vi/ {
        proxy_pass https://$invidious_host/vi/;
        proxy_http_version 1.1;
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
        proxy_ssl_server_name on;
        proxy_ssl_name $invidious_host;
        resolver 127.0.0.11 ipv6=off valid=30s;
        proxy_set_header Host $invidious_host;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # Страницы и /api/v1/*
    location / {
        proxy_pass http://frontend_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cookie $http_cookie;
        proxy_buffering off;
        proxy_read_timeout 3600;
    }
}
